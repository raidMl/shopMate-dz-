name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'client/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Sync client to docs
        run: |
          echo "🚀 Syncing client folder to docs folder..."
          cd client
          
          # Ensure docs directory exists
          mkdir -p docs
          
          # Copy all necessary files
          cp *.html docs/ 2>/dev/null || true
          cp *.json docs/ 2>/dev/null || true
          cp *.txt docs/ 2>/dev/null || true
          cp *.xml docs/ 2>/dev/null || true
          cp sw.js docs/ 2>/dev/null || true
          cp .htaccess docs/ 2>/dev/null || true
          
          # Copy directories
          [ -d "js" ] && cp -r js docs/ || true
          [ -d "styles" ] && cp -r styles docs/ || true
          [ -d "data" ] && cp -r data docs/ || true
          [ -d "assets" ] && cp -r assets docs/ || true
          [ -d "images" ] && cp -r images docs/ || true
          [ -d "icons" ] && cp -r icons docs/ || true
          
          echo "✅ Sync complete!"
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client/docs'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4