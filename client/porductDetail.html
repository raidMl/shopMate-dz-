<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Details - ShopMate</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/base.css">
  <link rel="stylesheet" href="./styles/components/navbar.css">
  <link rel="stylesheet" href="./styles/components/cart-drawer.css">
  <link rel="stylesheet" href="./styles/components/modal.css">
  <link rel="stylesheet" href="./styles/components/toast.css">    <link rel="stylesheet" href="./styles/components/formulaire.css">  <link rel="stylesheet" href="./styles/responsive.css">
  <style>
    .product-detail-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .product-detail-image {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.02);
      border-radius: 16px;
      min-height: 500px;
      position: relative;
      padding: 20px;
    }

    .product-detail-image img {
      max-width: 100%;
      max-height: 500px;
      object-fit: contain;
    }

    .product-detail-image .discount-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #ff6b6b;
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    .product-favorite-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10;
      outline: none;
      padding: 0;
      line-height: 1;
      color: #ff3000;
    }

    .product-favorite-btn:hover {
      transform: scale(1.15);
      box-shadow: 0 6px 20px rgba(255, 48, 0, 0.3);
      background: white;
      border-color: #ff3000;
    }

    .product-favorite-btn:active {
      transform: scale(0.95);
    }

    /* Dark mode styling */
    @media (prefers-color-scheme: dark) {
      .product-favorite-btn {
        background: rgba(45, 45, 45, 0.95);
        border-color: rgba(100, 100, 100, 0.5);
        color: #ff6b3d;
        box-shadow: 0 4px 16px rgba(255, 48, 0, 0.2);
      }

      .product-favorite-btn:hover {
        background: rgba(60, 60, 60, 1);
        border-color: #ff6b3d;
        box-shadow: 0 6px 20px rgba(255, 107, 61, 0.3);
      }
    }

    .star-icon {
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-favorite-btn.favorited .star-icon {
      animation: bounce-star 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes bounce-star {
      0% {
        transform: scale(0.8);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .product-detail-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .product-detail-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .product-detail-header h1 {
      font-size: 32px;
      margin: 0;
      line-height: 1.2;
    }

    .product-meta {
      display: flex;
      gap: 12px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .product-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .product-prices {
      display: flex;
      gap: 12px;
      align-items: baseline;
    }

    .original-price {
      font-size: 16px;
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .current-price {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
    }

    .product-description {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .product-colors {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .color-options {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .color-option {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .color-option:hover,
    .color-option.selected {
      border-color: var(--primary);
      transform: scale(1.1);
    }

    .color-label {
      font-size: 12px;
      text-align: center;
      margin-top: 4px;
    }

    .product-sizes {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .size-options {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .size-option {
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--surface);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .size-option:hover {
      border-color: var(--primary);
      background: var(--bg-hover);
      color: var(--text-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 48, 0, 0.15);
    }

    .size-option.selected {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(255, 48, 0, 0.25);
    }

    .size-option.out-of-stock {
      opacity: 0.5;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    /* Dark mode adjustments */
    @media (prefers-color-scheme: dark) {
      .size-option {
        background: var(--surface);
        color: var(--text-primary);
      }

      .size-option:hover {
        background: rgba(255, 107, 61, 0.1);
        box-shadow: 0 4px 12px rgba(255, 107, 61, 0.2);
      }
    }

    .product-actions {
      display: flex;
      gap: 12px;
    }

    .product-actions button {
      flex: 1;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
    }

    .specifications {
      border-top: 1px solid var(--border);
      padding-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .specifications h3 {
      margin: 0;
      font-size: 18px;
    }

    .specs-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .spec-item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: rgba(0, 0, 0, 0.02);
      border-radius: 8px;
    }

    .spec-key {
      font-weight: 600;
      color: var(--text-primary);
    }

    .spec-value {
      color: var(--text-secondary);
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      color: var(--primary);
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
    }

    .back-button:hover {
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: var(--text-muted);
    }

    .error {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: #ff6b6b;
    }

    @media (max-width: 768px) {
      .product-detail-container {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .product-detail-image {
        min-height: 300px;
      }

      .product-detail-image img {
        max-height: 300px;
      }

      .product-detail-header h1 {
        font-size: 24px;
      }

      .current-price {
        font-size: 24px;
      }

      .product-favorite-btn {
        width: 52px;
        height: 52px;
        top: 12px;
        left: 12px;
        font-size: 26px;
      }
    }
  </style>
</head>

  <script>
    // Favorites management
    function toggleFavorite(productId) {
      const index = state.favorites.indexOf(productId);
      if (index > -1) {
        state.favorites.splice(index, 1);
      } else {
        state.favorites.push(productId);
      }
      saveFavorites();
    }

    function saveFavorites() {
      if (typeof saveToLocalStorage === 'function') {
        saveToLocalStorage('favorites', state.favorites);
      } else {
        localStorage.setItem('favorites', JSON.stringify(state.favorites));
      }
    }

    // Get product ID from URL parameter
    function getProductIdFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // Display product details
    async function displayProductDetail() {
      const productId = getProductIdFromURL();
      
      if (!productId) {
        showError('Product ID not provided');
        return;
      }

      try {
        // Fetch products if not already loaded
        if (!products || products.length === 0) {
          await fetchProducts();
        }

        // Find the product
        const product = products.find(p => p.id === productId);

        if (!product) {
          showError('Product not found');
          return;
        }

        // Hide loading state
        document.getElementById('loadingState').style.display = 'none';

        // Render product detail
        renderProductDetail(product);
        
        // Update page title
        document.title = `${product.name} - ShopMate`;

      } catch (error) {
        console.error('Error loading product:', error);
        showError('Failed to load product details');
      }
    }

    function renderProductDetail(product) {
      const container = document.getElementById('productDetail');
      const imageUrl = product.image || imageFor(product.hue, product.name);
      const hasDiscount = product.discount && product.discount > 0;
      const isFavorited = state.favorites.includes(product.id);
      const cartQty = state.cart[product.id] || 0;
      const canAddMore = cartQty < product.stock;

      let html = `
        <div class="product-detail-container">
          <div class="product-detail-image">
            <button class="product-favorite-btn" id="productFavoriteIcon" data-product-id="${product.id}" title="Add to favorites">
              <svg class="star-icon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" stroke="currentColor" stroke-width="1.5">
                ${isFavorited ? 
                  `<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="currentColor"/>` :
                  `<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>`
                }
              </svg>
            </button>
            <img src="${imageUrl}" alt="${product.name}" onerror="this.src='${imageFor(product.hue, product.name)}'"/>
            ${hasDiscount ? `<div class="discount-badge">${product.discount}% OFF</div>` : ''}
          </div>

          <div class="product-detail-info">
            <div class="product-detail-header">
              <h1>${product.name}</h1>
              <div class="product-meta">
                <span>⭐ ${product.rating.toFixed(1)}</span>
                <span>${product.category.name || 'Uncategorized'}</span>
                <span>Stock: ${product.stock}</span>
              </div>
            </div>

            <div class="product-prices">
              ${hasDiscount ? `<span class="original-price">${money(product.originalPrice)}</span>` : ''}
              <span class="current-price">${money(product.price)}</span>
            </div>

            <p class="product-description">${product.description}</p>
      `;

      // Color options
      if (product.colors && product.colors.length > 0) {
        html += `
          <div class="product-colors">
            <label class="muted">Color</label>
            <div class="color-options">
              ${product.colors.map((color, index) => `
                <div style="text-align: center;">
                  <button 
                    class="color-option ${index === 0 ? 'selected' : ''}" 
                    style="background-color: ${color.hex}"
                    title="${color.name}"
                    data-color="${color.hex}">
                  </button>
                  <span class="color-label">${color.name}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Size options
      if (product.sizes && product.sizes.length > 0) {
        html += `
          <div class="product-sizes">
            <label class="muted">Size</label>
            <div class="size-options">
              ${product.sizes.map((size, index) => `
                <button 
                  class="size-option ${index === 0 ? 'selected' : ''} ${size.stock === 0 ? 'out-of-stock' : ''}"
                  data-size="${size.name}"
                  ${size.stock === 0 ? 'disabled' : ''}>
                  ${size.name}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Action buttons
      html += `
            <div class="product-actions">
              <button class="btn" id="addToCartBtn" ${!canAddMore ? 'disabled' : ''}>
                ${product.stock === 0 ? 'Out of Stock' : 
                  cartQty >= product.stock ? 'Max Added' : 
                  cartQty > 0 ? `Add More (${cartQty} in cart)` : 'Add to Cart'}
              </button>
              <button class="btn secondary" id="orderNowBtn">
                اطلب الآن
              </button>
            </div>
      `;

      // Specifications
      if (product.specifications && Object.keys(product.specifications).length > 0) {
        html += `
          <div class="specifications">
            <h3>Specifications</h3>
            <div class="specs-list">
              ${Object.entries(product.specifications).map(([key, value]) => `
                <div class="spec-item">
                  <span class="spec-key">${key.charAt(0).toUpperCase() + key.slice(1)}</span>
                  <span class="spec-value">${value}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      html += `</div>`;

      container.innerHTML = html;

      // Initialize formulaire component
      if (typeof OrderFormulaire !== 'undefined') {
        const formulaireContainer = document.getElementById('formulaireContainer');
        const formulaire = new OrderFormulaire(product.id, product, {
          deliveryPrice: 500,
          onOrderSuccess: (orderData) => {
            console.log('Order placed:', orderData);
            // Optional: Add additional success handling here
          }
        });
        formulaire.mount(formulaireContainer);
      }

      // Event listeners
      const addToCartBtn = document.getElementById('addToCartBtn');
      if (addToCartBtn && canAddMore) {
        addToCartBtn.addEventListener('click', () => {
          addToCart(product.id);
        });
      }

      const productFavoriteIcon = document.getElementById('productFavoriteIcon');
      if (productFavoriteIcon) {
        productFavoriteIcon.addEventListener('click', () => {
          toggleFavorite(product.id);
          const isFav = state.favorites.includes(product.id);
          const starIcon = productFavoriteIcon.querySelector('.star-icon');
          
          if (starIcon) {
            // Update the SVG path based on favorite status
            const pathElement = starIcon.querySelector('path');
            if (pathElement) {
              if (isFav) {
                // Filled star
                pathElement.setAttribute('d', 'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z');
                pathElement.setAttribute('fill', 'currentColor');
                pathElement.removeAttribute('stroke');
              } else {
                // Outlined star
                pathElement.setAttribute('d', 'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z');
                pathElement.setAttribute('fill', 'none');
                pathElement.setAttribute('stroke', 'currentColor');
              }
            }
          }
          
          // Add animation class
          productFavoriteIcon.classList.toggle('favorited', isFav);
          
          // Remove animation class after animation completes
          setTimeout(() => {
            productFavoriteIcon.classList.remove('favorited');
          }, 600);
        });
      }

      const orderNowBtn = document.getElementById('orderNowBtn');
      if (orderNowBtn) {
        orderNowBtn.addEventListener('click', () => {
          // Scroll to formulaire form smoothly
          const formulaireContainer = document.getElementById('formulaireContainer');
          if (formulaireContainer) {
            formulaireContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      }

      // Color selection
      document.querySelectorAll('.color-option').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
      });

      // Size selection
      document.querySelectorAll('.size-option').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.size-option').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
      });
    }

    function showError(message) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorState').textContent = `❌ ${message}`;
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', async () => {
      // First, ensure products are loaded
      if (!products || products.length === 0) {
        await fetchProducts();
      }
      
      // Initialize cart and checkout events
      if (typeof initCartEvents === 'function') {
        initCartEvents();
      }
      if (typeof initCheckoutEvents === 'function') {
        initCheckoutEvents();
      }
      
      // Initialize mobile navbar if available
      if (typeof MobileNavbar !== 'undefined' && !window.mobileNavbar) {
        window.mobileNavbar = new MobileNavbar();
      }
      
      // Update cart UI after products are loaded
      if (typeof updateCartUI === 'function') {
        updateCartUI();
      }
      
      // Load and display the product
      displayProductDetail();
    });
  </script>
</body>
</html>
