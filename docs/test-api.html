<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 10px 0; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>API Endpoint Test</h1>
    <button onclick="testProducts()">Test Products API</button>
    <button onclick="testCategories()">Test Categories API</button>
    
    <div id="results"></div>

    <script>
        const API_BASE_URL = 'https://ecommerce-otnyyyhby-raidmls-projects.vercel.app';
        
        function addResult(message, isSuccess) {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${isSuccess ? 'success' : 'error'}`;
            resultDiv.textContent = message;
            resultsDiv.appendChild(resultDiv);
        }
        
        async function testProducts() {
            try {
                console.log('Testing products API...');
                const response = await fetch(`${API_BASE_URL}/api/products`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                addResult(`✅ Products API: Success! Loaded ${data.length} products`, true);
                console.log('Products data:', data);
            } catch (error) {
                addResult(`❌ Products API: ${error.message}`, false);
                console.error('Products API error:', error);
            }
        }
        
        async function testCategories() {
            try {
                console.log('Testing categories API...');
                const response = await fetch(`${API_BASE_URL}/api/categories`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                addResult(`✅ Categories API: Success! Loaded ${data.length} categories`, true);
                console.log('Categories data:', data);
            } catch (error) {
                addResult(`❌ Categories API: ${error.message}`, false);
                console.error('Categories API error:', error);
            }
        }
        
        // Auto-test on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                testProducts();
                setTimeout(() => testCategories(), 1000);
            }, 1000);
        });
    </script>
</body>
</html>
